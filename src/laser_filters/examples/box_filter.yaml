scan_filter_chain:
- name: box_filter
  type: laser_filters/LaserScanBoxFilter
  params:
    box_frame: base_laser_link
    max_x: 0.15
    max_y: 0.2
    max_z: 0.1
    min_x: -0.2
    min_y: -0.1
    min_z: -0.1
    invert: false
- name: scan_filter
  type: laser_filters/LaserScanSectorFilter
  params:
    angle_min: 2.355                     # if not specified defaults to 0.0
    angle_max: 4.125                    # if not specified defaults to 0.0
    range_min: 0.01                      # if not specified defaults to 0.0
    range_max: 10.0                      # if not specified defaults to 100000.0
    clear_inside: true                  # if not specified defaults to true
    invert: false                       # (!clear_inside) if not specified defaults to false