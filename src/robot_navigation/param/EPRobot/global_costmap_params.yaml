global_costmap:
  global_frame: map  # 全局代价地图使用的参考坐标系
  robot_base_frame: base_footprint  # 机器人本体的参考坐标系
  update_frequency: 5.0  # 代价地图的更新频率(Hz)
  publish_frequency: 5.0  # 代价地图的发布频率(Hz)
  static_map: true  # 是否使用静态地图作为基础

  transform_tolerance: 0.8  # 坐标变换允许的最大延迟时间(s)
  cost_scaling_factor: 18.0  # 代价缩放因子（影响障碍物周围代价衰减率）
  inflation_radius: 0.12  # 障碍物膨胀半径（米）0.18
  # 代价地图插件配置
  plugins:
    - {name: static_layer,            type: "costmap_2d::StaticLayer"}  # 静态地图层，用于加载地图服务器的地图
    - {name: obstacle_layer,          type: "costmap_2d::VoxelLayer"}  # 障碍物层，使用体素表示三维空间中的障碍物
    - {name: inflation_layer,         type: "costmap_2d::InflationLayer"}  # 膨胀层，对障碍物周围区域进行代价膨胀