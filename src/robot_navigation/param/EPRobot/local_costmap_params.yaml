local_costmap:
  global_frame: map  # 局部代价地图所在坐标系
  robot_base_frame: base_footprint  # 机器人底盘坐标系

  update_frequency: 6.0  # 局部地图更新频率；从8降到6，减少频繁刷新导致TEB局部轨迹抖动
  publish_frequency: 3.0  # RViz显示频率，调试够用

  static_map: false  # 局部地图不直接使用整张静态地图
  rolling_window: true  # 使用滚动窗口

  width: 3.5  # 局部窗口宽度，过大会把太多后方障碍纳入优化，过小看不够前方；本版用3.5
  height: 3.5  # 局部窗口高度
  resolution: 0.05  # 5cm分辨率，稳定且算力压力小

  transform_tolerance: 0.5  # TF容忍时间

  plugins:
   - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}  # 激光障碍物层
   - {name: inflation_layer, type: "costmap_2d::InflationLayer"}  # 膨胀层
