local_costmap:
  global_frame: map  # 全局坐标系，用于定位代价地图
  robot_base_frame: base_footprint  # 机器人基座坐标系
  update_frequency: 5.0  # 代价地图更新频率（Hz）
  publish_frequency: 5.0  # 代价地图发布频率（Hz）
  static_map: false  # 不使用静态地图（依赖滚动窗口）
  rolling_window: true  # 启用滚动窗口模式，跟随机器人移动
  width: 3  # 代价地图宽度（米）
  height: 3  # 代价地图高度（米）
  resolution: 0.05  # 地图分辨率（米/单元格）
  transform_tolerance: 0.5  # 坐标变换容忍度（秒）
  cost_scaling_factor: 20  # 代价缩放因子（影响障碍物周围代价衰减率）
  inflation_radius: 0.24  # 障碍物膨胀半径（米）
  
  # 插件配置
  plugins:
  #  - {name: static_layer,        type: "costmap_2d::StaticLayer"}  # 静态地图层（用于融合静态地图）
   - {name: obstacle_layer,      type: "costmap_2d::ObstacleLayer"}  # 障碍物层（用于实时检测障碍物）
   - {name: inflation_layer,     type: "costmap_2d::InflationLayer"}  # 膨胀层（用于扩大障碍物影响范围）